<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Luxury emblem (ornament only, black and gold)">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E3C77A"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#E3C77A"/>
    </linearGradient>
    <style>
      .stroke { stroke: url(#gold); stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .strokeThin { stroke: url(#gold); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: .95; }
    </style>
  </defs>

  <!-- Top ornament -->
  <path class="strokeThin" d="M210 95
    C260 52, 340 52, 390 95
    C415 115, 450 120, 490 112
    C535 103, 570 80, 600 52
    C630 80, 665 103, 710 112
    C750 120, 785 115, 810 95
    C860 52, 940 52, 990 95" />

