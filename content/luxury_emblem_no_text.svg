  <path class="stroke" d="M170 160
    C120 165, 120 205, 170 210
    C205 214, 205 246, 170 250
    C130 256, 130 255, 170 260" />
  <path class="strokeThin" d="M190 170
    C155 176, 155 198, 190 204" />
  <path class="strokeThin" d="M190 226
    C155 232, 155 254, 190 260" />

  <!-- Corner curls (right) -->
  <path class="stroke" d="M1030 160
    C1080 165, 1080 205, 1030 210
