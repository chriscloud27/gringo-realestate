  <path class="stroke" d="M600 48
    C585 58, 575 72, 575 90
    C575 120, 605 122, 600 144
    C595 122, 625 120, 625 90
    C625 72, 615 58, 600 48" />

  <!-- Small leaves -->
  <path class="strokeThin" d="M520 102 C505 92, 490 90, 475 96 C490 104, 505 110, 520 102 Z" />
  <path class="strokeThin" d="M680 102 C695 92, 710 90, 725 96 C710 104, 695 110, 680 102 Z" />

  <!-- Frame lines (leave space in middle for separate text usage) -->
  <path class="strokeThin" d="M170 160 H1030" />
  <path class="strokeThin" d="M170 260 H1030" />

